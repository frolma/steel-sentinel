<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Steel Sentinel</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(120% 80% at 50% 0%, #1a2028 0%, #0d1014 60%);
    color: #d7dce2;
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap { max-width: 640px; padding: 60px 24px; text-align: center; }
  .kicker { color: #c8d64a; font-weight: 700; letter-spacing: 5px; font-size: 13px; text-transform: uppercase; }
  h1 { font-size: 44px; margin: 10px 0 6px; color: #f2f5f8; letter-spacing: 1px; }
  .tagline { color: #9aa4b0; font-size: 18px; margin-bottom: 36px; }
  .links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .links a {
    display: inline-block; padding: 12px 24px; border-radius: 8px;
    background: #161b21; border: 1px solid #2a323c; color: #e6ebf1;
    text-decoration: none; font-weight: 600;
  }
  .links a:hover { border-color: #c8d64a; color: #c8d64a; }
  footer { margin-top: 44px; color: #6d7682; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Tank Warfare</div>
  <h1>Steel Sentinel</h1>
  <p class="tagline">A tank game for iPhone and iPad.</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="support.html">Support</a>
  </div>
  <footer>© 2026 Maxim Frolov</footer>
</div>
</body>
</html>
